<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111832"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glowLeft" cx="18%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#006CFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#006CFF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="85%" cy="40%" r="20%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <!-- Compass needle gradient -->
    <linearGradient id="needleNorth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="100%" stop-color="#cc2d24"/>
    </linearGradient>
    <linearGradient id="needleSouth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c0c8d8"/>
    </linearGradient>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>

    <!-- Grid line pattern -->
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Ambient glow -->
  <rect width="1280" height="320" fill="url(#glowLeft)"/>
  <rect width="1280" height="320" fill="url(#glowRight)"/>

  <!-- Subtle top edge highlight -->
  <line x1="0" y1="0" x2="1280" y2="0" stroke="#006CFF" stroke-width="2" opacity="0.4"/>

  <!-- Decorative floating dots (scattered) -->
  <circle cx="100" cy="50" r="2" fill="#006CFF" opacity="0.2"/>
  <circle cx="320" cy="280" r="1.5" fill="#006CFF" opacity="0.15"/>
  <circle cx="520" cy="40" r="1" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="700" cy="290" r="2.5" fill="#006CFF" opacity="0.1"/>
  <circle cx="900" cy="60" r="1.5" fill="#8b5cf6" opacity="0.15"/>
  <circle cx="1100" cy="270" r="2" fill="#006CFF" opacity="0.12"/>
  <circle cx="1200" cy="80" r="1" fill="#8b5cf6" opacity="0.18"/>
  <circle cx="180" cy="250" r="1.5" fill="#006CFF" opacity="0.1"/>
  <circle cx="450" cy="70" r="1" fill="#ffffff" opacity="0.08"/>
  <circle cx="850" cy="250" r="1.5" fill="#ffffff" opacity="0.06"/>
  <circle cx="1050" cy="45" r="2" fill="#006CFF" opacity="0.08"/>
  <circle cx="600" cy="300" r="1" fill="#8b5cf6" opacity="0.1"/>

  <!-- Code bracket motifs -->
  <text x="60" y="130" font-family="-apple-system, SF Mono, Menlo, monospace" font-size="48" font-weight="200" fill="#006CFF" opacity="0.06">{</text>
  <text x="1190" y="220" font-family="-apple-system, SF Mono, Menlo, monospace" font-size="48" font-weight="200" fill="#8b5cf6" opacity="0.06">}</text>
  <text x="1050" y="80" font-family="-apple-system, SF Mono, Menlo, monospace" font-size="28" font-weight="200" fill="#006CFF" opacity="0.04">&lt;/&gt;</text>
  <text x="150" y="280" font-family="-apple-system, SF Mono, Menlo, monospace" font-size="24" font-weight="200" fill="#8b5cf6" opacity="0.04">{ }</text>

  <!-- ========== Safari Compass Icon ========== -->
  <g transform="translate(220, 160)">
    <!-- Outer ring glow -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="#006CFF" stroke-width="1" opacity="0.15"/>
    <circle cx="0" cy="0" r="78" fill="none" stroke="#006CFF" stroke-width="0.5" opacity="0.08"/>

    <!-- Main compass circle -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>

    <!-- Tick marks (cardinal) -->
    <line x1="0" y1="-64" x2="0" y2="-54" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="64" y1="0" x2="54" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="0" y1="64" x2="0" y2="54" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <line x1="-64" y1="0" x2="-54" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.8"/>

    <!-- Tick marks (ordinal - smaller) -->
    <line x1="45.25" y1="-45.25" x2="39.6" y2="-39.6" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>
    <line x1="45.25" y1="45.25" x2="39.6" y2="39.6" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>
    <line x1="-45.25" y1="45.25" x2="-39.6" y2="39.6" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>
    <line x1="-45.25" y1="-45.25" x2="-39.6" y2="-39.6" stroke="#ffffff" stroke-width="1.2" opacity="0.4"/>

    <!-- Compass needle - diamond shape (rotated 35deg like Safari's) -->
    <g transform="rotate(-35)">
      <!-- North half (red) -->
      <polygon points="0,-48 8,0 0,6 -8,0" fill="url(#needleNorth)" opacity="0.9"/>
      <!-- South half (white) -->
      <polygon points="0,48 8,0 0,-6 -8,0" fill="url(#needleSouth)" opacity="0.85"/>
    </g>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="3.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="0" r="1.5" fill="#006CFF" opacity="1"/>
  </g>

  <!-- ========== Text Content ========== -->

  <!-- "Safari MCP" title -->
  <text x="560" y="142" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Safari
    <tspan fill="#006CFF"> MCP</tspan>
  </text>

  <!-- Thin separator line -->
  <line x1="562" y1="164" x2="770" y2="164" stroke="#006CFF" stroke-width="2" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="562" y="198" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#a0aec0" letter-spacing="0.5">
    Native browser automation for AI agents
  </text>

  <!-- Feature badges -->
  <g transform="translate(562, 228)">
    <!-- Badge 1: Model Context Protocol -->
    <rect x="0" y="0" width="194" height="28" rx="14" fill="#006CFF" opacity="0.12" stroke="#006CFF" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="97" y="19" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#6CA8FF" text-anchor="middle" letter-spacing="0.5">Model Context Protocol</text>

    <!-- Badge 2: macOS + Safari -->
    <rect x="210" y="0" width="142" height="28" rx="14" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.25"/>
    <text x="281" y="19" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#a78bfa" text-anchor="middle" letter-spacing="0.5">macOS + Safari</text>

    <!-- Badge 3: Open Source -->
    <rect x="368" y="0" width="130" height="28" rx="14" fill="#006CFF" opacity="0.08" stroke="#006CFF" stroke-width="0.8" stroke-opacity="0.2"/>
    <text x="433" y="19" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#6CA8FF" text-anchor="middle" letter-spacing="0.5">Open Source</text>
  </g>

  <!-- Bottom subtle border -->
  <line x1="0" y1="319" x2="1280" y2="319" stroke="#006CFF" stroke-width="1" opacity="0.2"/>
</svg>
